apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: chase_travel_clone-config-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          envFrom:
            - configMapRef:
                name: wayfarer-common-config
          env:
            # Overrides the ConfigMap's SPRING_PROFILES_ACTIVE=docker: this
            # service's own application.yml hardcodes `native` to activate
            # its classpath config-repo backend. Letting `docker` win here
            # silently drops that profile, and Spring Cloud Config Server
            # falls back to its default git backend — which then fails with
            # "you need to configure a uri for the git repository" (a real
            # bug hit live — see LEARNING-LOG.md Phase 8). docker-compose
            # never had this bug because it never set SPRING_PROFILES_ACTIVE
            # for config-server at all; the shared K8s ConfigMap does, since
            # every OTHER service needs it — so this one service needs an
            # explicit override back. An `env:` entry always wins over the
            # same key sourced from `envFrom:`.
            - name: SPRING_PROFILES_ACTIVE
              value: native
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
