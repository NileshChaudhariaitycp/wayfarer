# Identical scrape targets to docker/prometheus.yml (Phase 7) — unchanged,
# because every service's K8s Service name below matches its docker-compose
# service name exactly, and K8s Service DNS resolves short names the same
# way Docker Compose's embedded DNS did.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "wayfarer-services"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - "api-gateway:8080"
              - "auth-service:8081"
              - "user-service:8082"
              - "flight-service:8083"
              - "hotel-service:8084"
              - "booking-service:8085"
              - "payment-service:8086"
              - "notification-service:8087"
              - "loyalty-service:8088"
              - "discovery-server:8761"
              - "config-server:8888"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
