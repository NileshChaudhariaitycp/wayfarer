# Shared env vars every domain service needs, consumed via envFrom in each
# Deployment — the K8s equivalent of the repeated `environment:` block every
# service had in docker-compose.yml. Service-specific vars (SPRING_DATASOURCE_URL,
# SPRING_CACHE_TYPE, SPRING_KAFKA_BOOTSTRAP_SERVERS) stay in each service's own
# manifest since they differ per service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wayfarer-common-config
data:
  SPRING_PROFILES_ACTIVE: "docker"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
  CONFIG_SERVER_URL: "http://config-server:8888"
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
  SPRING_H2_CONSOLE_ENABLED: "false"
