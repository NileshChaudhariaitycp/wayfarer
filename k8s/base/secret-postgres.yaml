# A K8s Secret is only base64-encoded, not encrypted at rest by default —
# checking this into git is the same real gap ADR 0009 already flagged for
# docker-compose's plaintext password, just wearing a different hat. A real
# deployment would use a secrets manager (Vault, AWS Secrets Manager, or at
# minimum sealed-secrets/SOPS) and never let this file exist in cleartext in
# version control. Kept as-is here, explicitly, for the same reason
# docker-compose's password was: avoid scope creep beyond this phase's goal.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_USER: wayfarer
  POSTGRES_PASSWORD: wayfarer_dev_password
  POSTGRES_DB: wayfarer
