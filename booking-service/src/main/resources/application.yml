server:
  port: 8085

spring:
  application:
    name: booking-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:h2:mem:bookingdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        "[spring.json.add.type.headers]": false
        # Default is 60000ms — KafkaTemplate.send() blocks the calling thread
        # this long to resolve topic metadata if the broker is unreachable.
        # Bounded low so a Kafka outage degrades a booking request by ~3s of
        # delay, not a full minute — see BookingEventPublisher's javadoc.
        "[max.block.ms]": 3000

# Bounds how long a single HTTP call to another service can take before
# Feign gives up — this is the "timeout" leg of resilience (circuit breaker
# and retry are configured below under resilience4j.*). Kept short since
# these are all same-machine calls in dev; a real deployment would tune this
# per downstream service based on its actual latency profile.
feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 3000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries
  health:
    circuitbreakers:
      enabled: true

# See ADR 0007: circuit breaker on every downstream client, automatic retry
# ONLY on the operations documented as idempotent in the Resilient*Client
# wrappers (getFlight, getHotel, refund, loyalty earn/reverse) — never on
# reserve/release/authorize.
resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      flightService:
        base-config: default
      hotelService:
        base-config: default
      paymentService:
        base-config: default
      loyaltyService:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 200ms
    instances:
      flightService:
        base-config: default
      hotelService:
        base-config: default
      paymentService:
        base-config: default
      loyaltyService:
        base-config: default
