# Same real gap as k8s/base/secret-postgres.yaml and ADR 0009's plaintext
# docker-compose password: a Helm values.yaml with a plaintext password is
# no more secure than any other plaintext file in git. A real deployment
# would pull this from a secrets manager at install time (--set-file,
# external-secrets operator, etc.), never commit it as a literal value.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.db | quote }}
