# Scrape config for the Prometheus container in docker-compose.yml.
# Each of our services already exposes /actuator/prometheus (Phase 6) —
# this just tells Prometheus where to find them, using Docker Compose's
# internal service-name DNS instead of localhost.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "wayfarer-services"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "api-gateway:8080"
          - "auth-service:8081"
          - "user-service:8082"
          - "flight-service:8083"
          - "hotel-service:8084"
          - "booking-service:8085"
          - "payment-service:8086"
          - "notification-service:8087"
          - "loyalty-service:8088"
          - "discovery-server:8761"
          - "config-server:8888"
