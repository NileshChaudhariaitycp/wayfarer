# Shared config served to every client whose spring.application.name doesn't
# have a more specific <name>.yml here. Real per-service settings get added
# to this folder as each service is built.
wayfarer:
  config-source: config-server
  jwt:
    # Demo-only: one shared symmetric (HMAC) secret, distributed via config-server,
    # used by auth-service to sign tokens and api-gateway to verify them.
    # Production-grade alternative: asymmetric signing (RS256/ES256) with auth-service
    # holding the private key and exposing a JWKS endpoint of public keys — any service
    # can then verify a token without ever holding key material that could mint one.
    secret: fmldFlds+ZqpTmrFtbhmgY1McMGThrY8f52H5XSL4DA=
    expiration-ms: 3600000

# Shared observability config — every client gets the same trace sampling
# rate and log format without duplicating it in 9 separate application.yml
# files. Sampling 100% of requests is a dev/demo choice only; a real
# production deployment samples a small percentage to bound tracing
# overhead and storage cost.
management:
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

