server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: config-server-route
              uri: lb://CONFIG-SERVER
              predicates:
                - Path=/config/**
              filters:
                - StripPrefix=1
            - id: auth-service-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
            - id: user-service-route
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

wayfarer:
  security:
    # Paths the JwtValidationGlobalFilter lets through without a token.
    # Everything else requires a valid Authorization: Bearer <token> header.
    public-paths:
      - /auth/register
      - /auth/login
      - /actuator/health
      - /config/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health
