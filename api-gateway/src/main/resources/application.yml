server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: config-server-route
              uri: lb://CONFIG-SERVER
              predicates:
                - Path=/config/**
              filters:
                - StripPrefix=1
            - id: auth-service-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
            - id: user-service-route
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**
            - id: flight-service-route
              uri: lb://FLIGHT-SERVICE
              predicates:
                - Path=/flights/**
            - id: hotel-service-route
              uri: lb://HOTEL-SERVICE
              predicates:
                - Path=/hotels/**
            - id: booking-service-route
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/bookings/**
            - id: loyalty-service-route
              uri: lb://LOYALTY-SERVICE
              predicates:
                - Path=/loyalty/**

wayfarer:
  security:
    # Paths the JwtValidationGlobalFilter lets through without a token,
    # regardless of HTTP method.
    public-paths:
      - /auth/register
      - /auth/login
      - /actuator/health
      - /config/**
    # Paths that are public for GET only — POST/PUT/DELETE on the same path
    # still require a valid token (flight/hotel search vs. admin CRUD).
    public-get-paths:
      - /flights/**
      - /hotels/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
